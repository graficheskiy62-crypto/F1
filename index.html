<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>F1 Clicker — Чиби Гонщики</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Comic Sans MS', 'Trebuchet MS', sans-serif;
    background: linear-gradient(135deg, #0b1e3f 0%, #1a3a6e 50%, #2d5aa0 100%);
    color: #e0f2ff;
    min-height: 100vh;
    overflow-x: hidden;
    padding: 20px;
  }
  h1 {
    text-align: center;
    color: #a8d8ff;
    text-shadow: 0 0 15px #4a90e2, 0 2px 4px #000;
    font-size: 2.2em;
    margin-bottom: 10px;
    letter-spacing: 2px;
  }
  .counter {
    text-align: center;
    font-size: 1.8em;
    color: #ffd86b;
    text-shadow: 0 0 10px #ffb300, 0 2px 3px #000;
    margin-bottom: 20px;
  }
  .counter .coin-icon {
    display: inline-block;
    width: 30px; height: 30px;
    background: radial-gradient(circle at 30% 30%, #fff3a0, #ffd86b 50%, #c99100);
    border-radius: 50%;
    border: 2px solid #8a6500;
    vertical-align: middle;
    margin-right: 8px;
    box-shadow: 0 0 12px #ffd86b;
  }
  .layout {
    display: grid;
    grid-template-columns: 1fr 380px;
    gap: 20px;
    max-width: 1300px;
    margin: 0 auto;
  }
  @media (max-width: 900px) {
    .layout { grid-template-columns: 1fr; }
  }
  .click-area {
    background: linear-gradient(180deg, #1e3c72 0%, #2a5298 100%);
    border: 3px solid #5aa9ff;
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 0 30px rgba(90, 169, 255, 0.4), inset 0 0 40px rgba(0,0,0,0.3);
    text-align: center;
    position: relative;
    overflow: hidden;
    min-height: 520px;
  }
  .current-name {
    font-size: 1.6em;
    color: #a8d8ff;
    margin-bottom: 6px;
    text-shadow: 0 0 8px #4a90e2;
  }
  .per-click {
    font-size: 1em;
    color: #ffd86b;
    margin-bottom: 12px;
  }
  .scene {
    width: 100%;
    max-width: 420px;
    aspect-ratio: 1 / 1;
    margin: 0 auto;
    cursor: pointer;
    transition: transform 0.1s;
    user-select: none;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  }
  .scene:active { transform: scale(0.97); }
  .scene.bounce { animation: bounce 0.3s; }
  @keyframes bounce {
    0% { transform: scale(1); }
    50% { transform: scale(1.05) translateY(-8px); }
    100% { transform: scale(1); }
  }
  .float-coin {
    position: absolute;
    pointer-events: none;
    font-size: 1.4em;
    font-weight: bold;
    color: #ffd86b;
    text-shadow: 0 0 8px #ffb300, 0 2px 2px #000;
    animation: floatUp 1s ease-out forwards;
  }
  @keyframes floatUp {
    0% { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-120px) scale(1.5); }
  }
  
  .shop {
    background: linear-gradient(180deg, #0f1e3f 0%, #1a2e5a 100%);
    border: 3px solid #5aa9ff;
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 0 25px rgba(90, 169, 255, 0.3), inset 0 0 30px rgba(0,0,0,0.2);
    max-height: 85vh;
    overflow-y: auto;
  }
  .shop::-webkit-scrollbar { width: 8px; }
  .shop::-webkit-scrollbar-track { background: #0b1e3f; border-radius: 4px; }
  .shop::-webkit-scrollbar-thumb { background: #5aa9ff; border-radius: 4px; }
  .shop::-webkit-scrollbar-thumb:hover { background: #7ac0ff; }
  
  .shop h2 {
    text-align: center;
    color: #a8d8ff;
    margin-bottom: 20px;
    text-shadow: 0 0 10px #4a90e2;
    font-size: 1.5em;
    letter-spacing: 1px;
    position: relative;
    padding-bottom: 10px;
  }
  .shop h2::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 20%;
    right: 20%;
    height: 2px;
    background: linear-gradient(90deg, transparent, #5aa9ff, transparent);
  }
  
  .driver-card {
    background: linear-gradient(135deg, #1a2e5a 0%, #0f1e3f 100%);
    border: 2px solid #3a5a8a;
    border-radius: 15px;
    padding: 12px;
    margin-bottom: 12px;
    display: grid;
    grid-template-columns: 80px 1fr auto;
    gap: 12px;
    align-items: center;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
  }
  .driver-card::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: linear-gradient(45deg, transparent, rgba(90, 169, 255, 0.1), transparent);
    transform: rotate(45deg);
    transition: all 0.5s;
  }
  .driver-card:hover::before {
    left: 100%;
  }
  .driver-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(90, 169, 255, 0.3);
  }
  .driver-card.active {
    border-color: #ffd86b;
    box-shadow: 0 0 20px rgba(255, 216, 107, 0.5), inset 0 0 20px rgba(255, 216, 107, 0.1);
    background: linear-gradient(135deg, #2a3e6a 0%, #1a2e5a 100%);
  }
  .driver-card.active::after {
    content: '★';
    position: absolute;
    top: 5px;
    right: 10px;
    color: #ffd86b;
    font-size: 1.2em;
    text-shadow: 0 0 8px #ffd86b;
  }
  .driver-card.owned {
    border-color: #66d9a0;
    background: linear-gradient(135deg, #1a3a4a 0%, #0f2a3a 100%);
  }
  
  .mini-scene {
    width: 80px; height: 80px;
    border-radius: 50%;
    overflow: hidden;
    border: 3px solid #5aa9ff;
    background: #0b1e3f;
    box-shadow: 0 0 10px rgba(90, 169, 255, 0.4);
    transition: all 0.3s;
  }
  .driver-card:hover .mini-scene {
    transform: scale(1.05);
    box-shadow: 0 0 15px rgba(90, 169, 255, 0.6);
  }
  .driver-card.active .mini-scene {
    border-color: #ffd86b;
    box-shadow: 0 0 15px rgba(255, 216, 107, 0.6);
  }
  .mini-scene svg { width: 100%; height: 100%; display: block; }
  
  .driver-info {
    font-size: 0.95em;
    position: relative;
    z-index: 1;
  }
  .driver-info .name {
    color: #e0f2ff;
    font-weight: bold;
    font-size: 1.05em;
    margin-bottom: 4px;
  }
  .driver-info .stats {
    color: #a8d8ff;
    font-size: 0.9em;
    margin-bottom: 3px;
  }
  .driver-info .price {
    color: #ffd86b;
    font-size: 0.9em;
    font-weight: bold;
  }
  
  .buy-btn {
    background: linear-gradient(180deg, #4a90e2 0%, #2a5aa0 100%);
    color: white;
    border: 2px solid #a8d8ff;
    padding: 10px 14px;
    border-radius: 10px;
    cursor: pointer;
    font-family: inherit;
    font-weight: bold;
    font-size: 0.9em;
    transition: all 0.3s;
    white-space: nowrap;
    box-shadow: 0 3px 8px rgba(0,0,0,0.3);
    position: relative;
    z-index: 1;
  }
  .buy-btn:hover:not(:disabled) {
    background: linear-gradient(180deg, #5aa9ff 0%, #3a6ab0 100%);
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(90, 169, 255, 0.5);
  }
  .buy-btn:active:not(:disabled) {
    transform: translateY(0);
  }
  .buy-btn:disabled {
    background: linear-gradient(180deg, #2a2a3a 0%, #1a1a2a 100%);
    border-color: #3a3a4a;
    color: #6a6a7a;
    cursor: not-allowed;
    box-shadow: none;
  }
  .buy-btn.select {
    background: linear-gradient(180deg, #66d9a0 0%, #3a9a70 100%);
    border-color: #a8ffcc;
  }
  .buy-btn.select:hover:not(:disabled) {
    background: linear-gradient(180deg, #7aeab0 0%, #4aaa80 100%);
    box-shadow: 0 5px 15px rgba(102, 217, 160, 0.5);
  }
  .buy-btn.selected {
    background: linear-gradient(180deg, #ffd86b 0%, #c99100 100%);
    border-color: #fff3a0;
    color: #3a2a00;
  }
  
  .reset-btn {
    display: block;
    margin: 20px auto 0;
    background: transparent;
    border: 2px solid #5aa9ff;
    color: #a8d8ff;
    padding: 8px 18px;
    border-radius: 8px;
    cursor: pointer;
    font-family: inherit;
    font-size: 0.85em;
    transition: all 0.3s;
  }
  .reset-btn:hover {
    background: rgba(90, 169, 255, 0.15);
    border-color: #7ac0ff;
    color: #c0e8ff;
  }
</style>
</head>
<body>

<h1>🏁 F1 ЧИБИ КЛИКЕР 🏁</h1>
<div class="counter">

    <button class="reset-btn" onclick="resetGame()">Сбросить прогресс</button>

</div>

  const saved = localStorage.getItem('f1Clicker4');
  if (saved) state = { ...state, ...JSON.parse(saved) };
} catch(e) {}

function save() {
  try { localStorage.setItem('f1Clicker4', JSON.stringify(state)); } catch(e) {}
}

function getCurrentDriver() {
  return drivers.find(d => d.id === state.current);
}

function formatCoins(n) {
  return Number.isInteger(n) ? n : n.toFixed(1);
}

function render() {
  document.getElementById('coinCount').textContent = formatCoins(state.coins);
  const cur = getCurrentDriver();
  document.getElementById('currentName').textContent = cur.name;
  const word = cur.perClick === 1 ? 'монетка' : 'монеток';
  document.getElementById('perClick').textContent = `+${formatCoins(cur.perClick)} ${word} за клик`;

  document.getElementById('sceneContainer').innerHTML =
    `<div class="scene" onclick="clickDriver(event)">${chibiSVG(cur)}</div>`;

  const shop = document.getElementById('shopList');
  shop.innerHTML = '';
  drivers.forEach(d => {
    const owned = state.owned.includes(d.id);
    const isCurrent = state.current === d.id;
    const canAfford = state.coins >= d.price;

    const card = document.createElement('div');
    card.className = 'driver-card' + (isCurrent ? ' active' : '') + (owned ? ' owned' : '');

    let btnHtml;
    if (d.price === 0) {
      btnHtml = `<button class="buy-btn selected" disabled>Старт</button>`;
    } else if (!owned) {
      btnHtml = `<button class="buy-btn" ${canAfford ? '' : 'disabled'} onclick="buyDriver('${d.id}')">🪙 ${d.price}</button>`;
    } else if (isCurrent) {
      btnHtml = `<button class="buy-btn selected" disabled>Активен</button>`;
    } else {
      btnHtml = `<button class="buy-btn select" onclick="selectDriver('${d.id}')">Выбрать</button>`;
    }

    card.innerHTML = `
      <div class="mini-scene">${miniAvatar(d)}</div>
      <div class="driver-info">
        <div class="name">${d.name}</div>
        <div class="stats">+${formatCoins(d.perClick)} / клик</div>
        ${d.price > 0 ? `<div class="price">Цена: ${d.price} 🪙</div>` : ''}
      </div>
      ${btnHtml}
    `;
    shop.appendChild(card);
  });
}

function clickDriver(event) {
  const cur = getCurrentDriver();
  state.coins += cur.perClick;
  state.coins = Math.round(state.coins * 10) / 10;

  const scene = document.querySelector('.scene');
  scene.classList.remove('bounce');
  void scene.offsetWidth;
  scene.classList.add('bounce');

  const area = document.getElementById('clickArea');
  const rect = area.getBoundingClientRect();
  const coin = document.createElement('div');
  coin.className = 'float-coin';
  coin.textContent = `+${formatCoins(cur.perClick)} 🪙`;
  coin.style.left = (event.clientX - rect.left - 20) + 'px';
  coin.style.top = (event.clientY - rect.top - 20) + 'px';
  area.appendChild(coin);
  setTimeout(() => coin.remove(), 1000);

  save();
  render();
}

function buyDriver(id) {
  const d = drivers.find(x => x.id === id);
  if (!d || state.owned.includes(id) || state.coins < d.price) return;
  state.coins -= d.price;
  state.coins = Math.round(state.coins * 10) / 10;
  state.owned.push(id);
  state.current = id;
  save();
  render();
}

function selectDriver(id) {
  if (!state.owned.includes(id)) return;
  state.current = id;
  save();
  render();
}

function resetGame() {
  if (!confirm('Точно сбросить весь прогресс?')) return;
  state = { coins: 0, owned: ['verstappen'], current: 'verstappen' };
  save();
  render();
}

render();
</script>
